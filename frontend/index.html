<!DOCTYPE html>
<html>
<head>
  <title>Allie-kat Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a0f1c, #05070c);
      color: #00eaff;
    }

    .container {
      max-width: 720px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: rgba(17, 24, 35, 0.9);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0, 234, 255, 0.15);
      border: 1px solid rgba(0, 234, 255, 0.2);
    }

    .logo {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .tagline {
      text-align: center;
      font-size: 12px;
      color: #7ad6e3;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #111823;
      color: white;
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .primary {
      background: linear-gradient(90deg, #00eaff, #00bcd4);
      color: black;
    }

    .secondary {
      background: #1a2430;
      color: #00eaff;
      border: 1px solid #00eaff;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #0e1621;
      border-radius: 10px;
      white-space: pre-wrap;
      min-height: 140px;
      border: 1px solid rgba(0, 234, 255, 0.2);
    }

    .section-title {
      margin-top: 15px;
      font-size: 13px;
      color: #7ad6e3;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="logo">ALLIE-KAT ASSISTANT</div>
      <div class="tagline">
        Intelligent diagnostics for the modern technician
      </div>

      <div class="row">
        <input id="vin" placeholder="VIN" />
        <input id="code" placeholder="Fault Code" />
      </div>

      <input id="symptom" placeholder="Symptom (no start, derate, no throttle, etc.)" />

      <div class="section-title">DIAGNOSTIC NOTES / TEST RESULTS</div>
      <textarea id="notes" placeholder="Enter known info and results..."></textarea>

      <div class="row">
        <input id="newResult" placeholder="Add new test result..." />
        <button class="secondary" id="addBtn">Add</button>
      </div>

      <button class="primary" id="diagBtn">RUN DIAGNOSTIC</button>

      <div class="result" id="result">
        Awaiting input...
      </div>

    </div>
  </div>

  <script>
    const backend = "https://alliekat-app-production.up.railway.app/diagnose";

    document.getElementById('addBtn').onclick = () => {
      const newResult = document.getElementById('newResult');
      const notes = document.getElementById('notes');

      if (newResult.value.trim()) {
        notes.value += (notes.value ? "\\n- " : "- ") + newResult.value;
        newResult.value = "";
      }
    };

    document.getElementById('diagBtn').onclick = async () => {
      const vin = document.getElementById('vin').value;
      const code = document.getElementById('code').value;
      const symptom = document.getElementById('symptom').value;
      const notes = document.getElementById('notes').value;

      const resultBox = document.getElementById('result');
      resultBox.innerText = "Analyzing...";

      try {
        const res = await fetch(backend, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ vin, code, symptom, notes })
        });

        const data = await res.json();
        resultBox.innerText = data.diagnosis;
      } catch (e) {
        resultBox.innerText = "Connection error";
      }
    };
  </script>
</body>
</html>
