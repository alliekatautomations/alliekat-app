<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allie-Kat Diagnostics v2.0</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #eefcff;
      background:
        radial-gradient(circle at top, rgba(0, 217, 255, 0.10), transparent 24%),
        linear-gradient(180deg, #02060b 0%, #07111b 45%, #03070d 100%);
    }

    .wrap { max-width: 1150px; margin: 0 auto; padding: 20px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(76, 229, 255, 0.20);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 18px;
      background: rgba(5, 15, 25, 0.96);
    }

    .title { color:#4ce5ff; font-size:28px; }
    .title span { color:#fff; }

    .motto { font-size:13px; color:#8ebacc; }

    .status {
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(76,229,255,0.2);
      background:#0b1d2a;
      color:#aef7ff;
      font-size:12px;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
    }

    .panel {
      border:1px solid rgba(76,229,255,0.15);
      border-radius:18px;
      padding:16px;
      background:#071722;
    }

    input, textarea {
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid rgba(76,229,255,0.15);
      background:#0b1d2a;
      color:#fff;
      margin-bottom:10px;
    }

    button {
      padding:10px 14px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .primary { background:#00d9ff; color:#021018; }
    .secondary { background:#112a3b; color:#9ef3ff; }

    .pass { background:#00d878; }
    .fail { background:#ff4d4d; }
    .skip { background:#ffaa00; }
    .back { background:#33485a; }

    .step-card {
      border:1px solid rgba(76,229,255,0.15);
      border-radius:14px;
      padding:14px;
      margin-top:10px;
    }

    .step-title { color:#4ce5ff; font-size:20px; }

    .label { font-size:11px; color:#7fb8cd; margin-top:8px; }

    .value { font-size:14px; }

    .learning-box {
      border:1px solid rgba(76,229,255,0.2);
      border-radius:14px;
      padding:10px;
      margin-bottom:12px;
      background:#081a26;
    }

    .learning-item {
      border-bottom:1px solid rgba(76,229,255,0.1);
      padding:8px 0;
    }

    .learning-title { color:#4ce5ff; font-weight:bold; }
    .learning-count { font-size:12px; color:#9fd9e6; }
  </style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="title">Allie-Kat Diagnostics <span>v2.0</span></div>
      <div class="motto">Revolutionizing your automotive experience...</div>
    </div>
    <div id="status" class="status">System Ready</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h3>Start Diagnosis</h3>
      <input id="vin" placeholder="VIN">
      <input id="code" placeholder="DTC Code">
      <input id="symptom" placeholder="Complaint">
      <textarea id="notes" placeholder="Notes"></textarea>

      <button class="primary" onclick="startDiag()">Start</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>

    <div class="panel">
      <h3>Diagnosis</h3>

      <!-- 🔥 LEARNING PANEL -->
      <div id="learningContainer"></div>

      <div id="stepContainer">
        <div class="step-card">No data yet</div>
      </div>
    </div>
  </div>
</div>

<script>
const backend = "https://alliekat-app.onrender.com";

let tree = null;
let currentStep = null;

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function renderStep(){
  if(!currentStep){
    document.getElementById("stepContainer").innerHTML = "<div class='step-card'>Done</div>";
    return;
  }

  const buttons = currentStep.result_buttons.map(b=>{
    let cls="skip";
    if(b.label==="PASS") cls="pass";
    if(b.label==="FAIL") cls="fail";

    return `<button class="${cls}" onclick="nextStep('${b.next_step_id}')">${b.label}</button>`;
  }).join("");

  document.getElementById("stepContainer").innerHTML = `
    <div class="step-card">
      <div class="step-title">${currentStep.title}</div>

      <div class="label">Instruction</div>
      <div class="value">${currentStep.instruction}</div>

      <div class="label">Where To Test</div>
      <div class="value">${currentStep.where_to_test}</div>

      <div class="label">Expected Voltage</div>
      <div class="value">${currentStep.expected_specs.voltage}</div>

      <div class="label">Expected Ohms</div>
      <div class="value">${currentStep.expected_specs.ohms}</div>

      <div class="label">How To Test</div>
      <div class="value">${currentStep.how_to_test}</div>

      <div style="margin-top:10px;">${buttons}</div>
    </div>
  `;
}

function nextStep(id){
  currentStep = tree.steps.find(s=>s.id===id);
  renderStep();
}

async function startDiag(){
  setStatus("Building smart diagnosis...");

  const res = await fetch(`${backend}/diagnose-detailed`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      vin:vin.value,
      code:code.value,
      symptom:symptom.value,
      notes:notes.value
    })
  });

  const data = await res.json();

  // 🔥 LEARNING DISPLAY
  if(data.suggested_fixes && data.suggested_fixes.length){
    document.getElementById("learningContainer").innerHTML =
      `<div class="learning-box">
        <div class="learning-title">Known Fixes</div>
        ${
          data.suggested_fixes.map(f=>`
            <div class="learning-item">
              <div class="learning-title">${f.final_fix}</div>
              <div class="learning-count">Seen ${f.count} time(s)</div>
            </div>
          `).join("")
        }
      </div>`;
  } else {
    document.getElementById("learningContainer").innerHTML = "";
  }

  tree = data.tree;
  currentStep = tree.steps[0];
  renderStep();

  setStatus("Ready");
}

function clearAll(){
  vin.value="";
  code.value="";
  symptom.value="";
  notes.value="";
  document.getElementById("stepContainer").innerHTML="No data";
  document.getElementById("learningContainer").innerHTML="";
}
</script>

</body>
</html>
