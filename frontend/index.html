<!DOCTYPE html>
<html>
<head>
  <title>Allie-Kat Diagnostics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="font-family: Arial; max-width: 900px; margin: auto; padding: 20px;">

  <h1>Allie-Kat Diagnostics</h1>

  <input id="vin" placeholder="VIN" style="width:100%; padding:10px; margin-bottom:10px;" />
  <input id="code" placeholder="Fault Code" style="width:100%; padding:10px; margin-bottom:10px;" />
  <input id="symptom" placeholder="Symptom" style="width:100%; padding:10px; margin-bottom:10px;" />

  <textarea id="notes" placeholder="Notes / Completed tests" style="width:100%; padding:10px; margin-bottom:10px;" rows="5"></textarea>

  <button onclick="runDiagnosis()" style="width:100%; padding:12px; margin-bottom:10px;">
    Run Diagnosis
  </button>

  <div id="saveStatus" style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
    Save status: waiting
  </div>

  <div id="vehicle" style="border:1px solid #ccc; padding:10px; margin-bottom:10px;"></div>

  <div id="output" style="white-space:pre-wrap; border:1px solid #ccc; padding:10px;"></div>

  <script>
    const backend = "https://alliekat-app.onrender.com";

    let lastDiagnosis = "";
    let lastVehicle = {};

    async function autoSaveRepair() {
      const vin = document.getElementById('vin').value;
      const code = document.getElementById('code').value;
      const symptom = document.getElementById('symptom').value;
      const notes = document.getElementById('notes').value;

      document.getElementById('saveStatus').innerText = 'Save status: saving...';

      const res = await fetch(`${backend}/save-repair`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          vin: lastVehicle.vin || vin,
          year: lastVehicle.year || '',
          make: lastVehicle.make || '',
          model: lastVehicle.model || '',
          engine: lastVehicle.engine || '',
          fault_code: code,
          complaint: symptom,
          ai_diagnosis: lastDiagnosis,
          recommended_tests: '',
          final_fix: '',
          tech_name: '',
          status: 'open',
          notes: notes
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('saveStatus').innerText = 'Save status: auto-saved';
      } else {
        document.getElementById('saveStatus').innerText = 'Save status: save failed';
      }
    }

    async function runDiagnosis() {
      const vin = document.getElementById('vin').value;
      const code = document.getElementById('code').value;
      const symptom = document.getElementById('symptom').value;
      const notes = document.getElementById('notes').value;

      document.getElementById('saveStatus').innerText = 'Save status: waiting on diagnosis...';
      document.getElementById('output').innerText = 'Running diagnosis...';

      const res = await fetch(`${backend}/diagnose`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vin, code, symptom, notes })
      });

      const data = await res.json();

      lastDiagnosis = data.diagnosis || '';
      lastVehicle = data.vehicle || {};

      document.getElementById('output').innerText = data.diagnosis || '';

      document.getElementById('vehicle').innerText =
        `VIN: ${lastVehicle.vin || vin}
Year: ${lastVehicle.year || ''}
Make: ${lastVehicle.make || ''}
Model: ${lastVehicle.model || ''}
Engine: ${lastVehicle.engine || ''}`;

      await autoSaveRepair();
    }
  </script>

</body>
</html>
