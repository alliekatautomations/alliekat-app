<!DOCTYPE html>
<html>
<head>
  <title>Allie-kat Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #00eaff;
      padding: 20px;
    }

    .wrap {
      max-width: 560px;
      margin: 40px auto;
      background: #111823;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    p.sub {
      margin-top: 0;
      color: #9cc7d1;
      font-size: 14px;
    }

    input, button, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input, textarea {
      background: #1a2430;
      color: white;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      background: #00eaff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    pre {
      white-space: pre-wrap;
      background: #1a2430;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      color: white;
      min-height: 120px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #9cc7d1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Allie-kat Assistant</h1>
    <p class="sub">AI-powered diagnostic assistant</p>

    <input id="vin" placeholder="Enter VIN" />
    <input id="code" placeholder="Enter Fault Code" />
    <input id="symptom" placeholder="Enter symptom (ex: no start, derate, low power)" />
    <textarea id="notes" placeholder="Extra notes (optional): year, make, model, engine, recent repairs, what the unit is doing"></textarea>

    <button id="diagBtn">Diagnose</button>

    <div class="hint">
      Example: P0016 + extended crank + had front cover work done
    </div>

    <pre id="result">Result will show here</pre>
  </div>

  <script>
    document.getElementById('diagBtn').addEventListener('click', async function () {
      const vin = document.getElementById('vin').value.trim();
      const code = document.getElementById('code').value.trim();
      const symptom = document.getElementById('symptom').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const resultBox = document.getElementById('result');

      resultBox.textContent = 'Checking...';

      try {
        const res = await fetch('https://alliekat-app-production.up.railway.app/diagnose', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            vin,
            code,
            symptom,
            notes
          })
        });

        const data = await res.json();
        resultBox.textContent = data.diagnosis || JSON.stringify(data, null, 2);
      } catch (err) {
        resultBox.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
