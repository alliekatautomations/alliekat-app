<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Allie-Kat Diagnostics v2.0</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #02070d, #07111a);
  color: #eaf8ff;
}

.wrap {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.header {
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  background: rgba(5,15,25,0.95);
  box-shadow: 0 0 20px rgba(0,200,255,0.1);
}

.title {
  font-size: 34px;
  color: #4ce5ff;
}

.subtitle {
  font-size: 14px;
  color: #8bbfd0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.panel {
  border-radius: 20px;
  padding: 18px;
  border: 1px solid rgba(0,255,255,0.15);
  background: rgba(6,18,28,0.95);
}

.panel h2 {
  margin-top: 0;
  color: #4ce5ff;
}

label {
  font-size: 12px;
  color: #7fb8cd;
  display: block;
  margin-top: 12px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(0,255,255,0.2);
  background: #0b1d2a;
  color: white;
  margin-top: 6px;
}

textarea {
  min-height: 120px;
}

button {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.primary {
  background: linear-gradient(90deg,#00d9ff,#0099ff);
  color: black;
}

.secondary {
  background: #112a3b;
  color: #9ef3ff;
}

.vehicle, .output {
  margin-top: 12px;
  border: 1px solid rgba(0,255,255,0.15);
  padding: 12px;
  border-radius: 14px;
}

.output {
  min-height: 300px;
  white-space: pre-wrap;
}

.footer {
  text-align: center;
  margin-top: 20px;
  color: #6f95a8;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <div class="title">ALLIE-KAT DIAGNOSTICS v2.0</div>
    <div class="subtitle">
      Revolutionizing your automotive experience with intelligent technology to transport your machine into the future....
    </div>
  </div>

  <div class="grid">

    <div class="panel">
      <h2>Start Diagnosis</h2>

      <label>DTC Code</label>
      <input id="code" placeholder="P2135">

      <label>VIN</label>
      <input id="vin">

      <label>Symptom</label>
      <input id="symptom">

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <button class="primary" onclick="runDiagnosis()">Start Diagnosis</button>
      <button class="secondary" onclick="clearForm()">Clear</button>
    </div>

    <div class="panel">
      <h2>Results</h2>

      <div class="vehicle" id="vehicle">Vehicle data will appear here</div>

      <div class="output" id="output">
        Waiting for diagnosis...
      </div>
    </div>

  </div>

  <div class="footer">
    Allie-Kat Automations
  </div>

</div>

<script>
const backend = "https://alliekat-app.onrender.com";

let lastDiagnosis = "";
let lastVehicle = {};

function setVehicle(v, vinInput){
  document.getElementById("vehicle").innerText =
`VIN: ${v.vin || vinInput}
Year: ${v.year || ""}
Make: ${v.make || ""}
Model: ${v.model || ""}
Engine: ${v.engine || ""}`;
}

async function autoSave(){
  const vin = document.getElementById("vin").value;
  const code = document.getElementById("code").value;
  const symptom = document.getElementById("symptom").value;
  const notes = document.getElementById("notes").value;

  await fetch(`${backend}/save-repair`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      vin:lastVehicle.vin || vin,
      year:lastVehicle.year || "",
      make:lastVehicle.make || "",
      model:lastVehicle.model || "",
      engine:lastVehicle.engine || "",
      fault_code:code,
      complaint:symptom,
      ai_diagnosis:lastDiagnosis,
      status:'open',
      notes:notes
    })
  });
}

async function runDiagnosis(){
  const vin = document.getElementById("vin").value;
  const code = document.getElementById("code").value;
  const symptom = document.getElementById("symptom").value;
  const notes = document.getElementById("notes").value;

  document.getElementById("output").innerText = "Running diagnosis...";

  const res = await fetch(`${backend}/diagnose`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({vin,code,symptom,notes})
  });

  const data = await res.json();

  lastDiagnosis = data.diagnosis;
  lastVehicle = data.vehicle;

  setVehicle(lastVehicle,vin);

  document.getElementById("output").innerText = data.diagnosis;

  await autoSave();
}

function clearForm(){
  document.getElementById("vin").value="";
  document.getElementById("code").value="";
  document.getElementById("symptom").value="";
  document.getElementById("notes").value="";
  document.getElementById("output").innerText="Waiting for diagnosis...";
  document.getElementById("vehicle").innerText="Vehicle data will appear here";
}
</script>

</body>
</html>
