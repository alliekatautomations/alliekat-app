<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:linear-gradient(180deg,#02060b,#06111b);
  color:#eaf8ff;
  font-family:Arial;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid rgba(0,255,255,0.2);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.title{
  color:#4ce5ff;
  font-size:28px;
}

.status{
  border:1px solid rgba(0,255,255,0.2);
  padding:8px 12px;
  border-radius:20px;
}

.panel{
  border:1px solid rgba(0,255,255,0.2);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

input, textarea{
  width:100%;
  margin-top:8px;
  margin-bottom:10px;
  padding:12px;
  background:#0b1d2a;
  color:white;
  border:1px solid rgba(0,255,255,0.2);
  border-radius:10px;
}

button{
  padding:12px 16px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.primary{ background:#00d9ff; color:black; }
.pass{ background:#00ff88; }
.fail{ background:#ff4d4d; color:white; }
.skip{ background:#ffaa00; }
.back{ background:#334; color:white; }
.complete{ background:#00bfff; color:black; }

.step{
  border:1px solid rgba(0,255,255,0.2);
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div class="title">ALLIE-KAT DIAGNOSTICS v2.0</div>
<div id="status" class="status">Ready</div>
</div>

<div id="inputPanel" class="panel">
<input id="vin" placeholder="VIN">
<input id="code" placeholder="Code">
<input id="symptom" placeholder="Symptom">
<textarea id="notes" placeholder="Notes"></textarea>
<button class="primary" onclick="startDiag()">Start Diagnosis</button>
</div>

<div id="stepPanel" class="panel" style="display:none;">
<div id="stepBox"></div>
</div>

</div>

<script>
const backend = "https://alliekat-app.onrender.com";

let tree = {};
let currentStep = null;
let stepStack = [];

// ================= START DIAG =================
async function startDiag(){

  status.innerText="Loading...";

  const res = await fetch(`${backend}/diagnose`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      vin:vin.value,
      code:code.value,
      symptom:symptom.value,
      notes:notes.value
    })
  });

  const data = await res.json();

  if(!data.tree){
    status.innerText="Error loading";
    return;
  }

  tree = data.tree;
  currentStep = tree.steps.find(s=>s.id===tree.current_step_id);

  inputPanel.style.display="none";
  stepPanel.style.display="block";

  status.innerText="Diagnosis Ready";

  render();
}

// ================= RENDER =================
function render(){

  // FINAL SCREEN
  if(!currentStep){
    stepBox.innerHTML=`
      <div class="step">
        <h3>Diagnosis Complete</h3>

        <p><b>Likely Fault:</b><br>${tree.likely_fault_path || ""}</p>
        <p><b>Recommendation:</b><br>${tree.final_recommendation || ""}</p>

        <textarea id="finalFix" placeholder="Enter final repair performed"></textarea>

        <button class="complete" onclick="saveFinal()">Save Final Fix</button>
      </div>
    `;
    return;
  }

  let buttons = currentStep.result_buttons.map(b=>{
    let cls="skip";
    if(b.label==="PASS") cls="pass";
    if(b.label==="FAIL") cls="fail";

    return `<button class="${cls}" onclick="nextStep('${b.next_step_id}','${b.label}')">${b.label}</button>`;
  }).join("");

  let backBtn = stepStack.length > 0
    ? `<button class="back" onclick="goBack()">⬅ Back</button>`
    : "";

  stepBox.innerHTML=`
    <div class="step">
      <h3>${currentStep.title}</h3>

      <p><b>Test:</b> ${currentStep.instruction}</p>
      <p><b>Where:</b> ${currentStep.where_to_test}</p>

      <p><b>Voltage:</b> ${currentStep.expected_specs.voltage}</p>
      <p><b>Ohms:</b> ${currentStep.expected_specs.ohms}</p>
      <p><b>Pressure:</b> ${currentStep.expected_specs.pressure}</p>
      <p><b>Signal:</b> ${currentStep.expected_specs.signal}</p>
      <p><b>Voltage Drop:</b> ${currentStep.expected_specs.voltage_drop}</p>

      <p><b>How:</b> ${currentStep.how_to_test}</p>

      ${buttons}

      <br>
      ${backBtn}
    </div>
  `;
}

// ================= NEXT =================
function nextStep(id,result){

  stepStack.push(currentStep);

  currentStep = tree.steps.find(s=>s.id===id);

  render();

  fetch(`${backend}/record-step-result`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      vin:vin.value,
      fault_code:code.value,
      step_id:currentStep?.id || "",
      button_result:result
    })
  });
}

// ================= BACK =================
function goBack(){
  if(stepStack.length===0) return;
  currentStep = stepStack.pop();
  render();
}

// ================= FINAL FIX =================
async function saveFinal(){

  const fix = document.getElementById("finalFix").value;

  if(!fix){
    status.innerText="Enter final fix first";
    return;
  }

  status.innerText="Saving repair...";

  try{
    const res = await fetch(`${backend}/save-repair`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        vin:vin.value,
        fault_code:code.value,
        complaint:symptom.value,
        final_fix:fix,
        status:"fixed",
        notes:notes.value
      })
    });

    const data = await res.json();

    if(data.success){
      status.innerText="Repair Saved ✔";
    }else{
      status.innerText="Save failed";
      console.log(data);
    }

  }catch(err){
    status.innerText="Save error";
    console.log(err);
  }
}
</script>

</body>
</html>
