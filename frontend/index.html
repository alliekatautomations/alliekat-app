<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allie-Kat Diagnostics v2.0</title>

<style>
body {
  background:#06111b;
  color:#eaf8ff;
  font-family:Arial;
  margin:0;
}

.wrap {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.header {
  border:1px solid rgba(0,255,255,0.2);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.title { color:#4ce5ff; font-size:28px; }

.panel {
  border:1px solid rgba(0,255,255,0.2);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

input, textarea {
  width:100%;
  margin-top:8px;
  margin-bottom:10px;
  padding:10px;
  background:#0b1d2a;
  color:white;
  border:1px solid rgba(0,255,255,0.2);
  border-radius:8px;
}

button {
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.primary { background:#00d9ff; color:black; }
.pass { background:#00ff88; }
.fail { background:#ff4d4d; }
.skip { background:#ffaa00; }

.step-box {
  border:1px solid rgba(0,255,255,0.2);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div class="title">ALLIE-KAT DIAGNOSTICS v2.0</div>
<div id="status">Ready</div>
</div>

<div class="panel" id="inputPanel">
<input id="vin" placeholder="VIN">
<input id="code" placeholder="Code">
<input id="symptom" placeholder="Symptom">
<textarea id="notes" placeholder="Notes"></textarea>
<button class="primary" onclick="startDiag()">Start Diagnosis</button>
</div>

<div class="panel" id="stepPanel" style="display:none;">
<div id="stepContent"></div>
</div>

</div>

<script>
const backend = "https://alliekat-app.onrender.com";

let tree = {};
let currentStep = null;

async function startDiag() {
  document.getElementById("status").innerText = "Loading...";

  const res = await fetch(`${backend}/diagnose`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      vin:vin.value,
      code:code.value,
      symptom:symptom.value,
      notes:notes.value
    })
  });

  const data = await res.json();

  tree = data.tree;

  currentStep = tree.steps.find(s => s.id === tree.current_step_id);

  document.getElementById("inputPanel").style.display = "none";
  document.getElementById("stepPanel").style.display = "block";

  renderStep();
}

function renderStep() {

  if(!currentStep){
    document.getElementById("stepContent").innerHTML =
      `<h3>Complete</h3><p>${tree.likely_fault_path}</p>`;
    return;
  }

  let buttons = currentStep.result_buttons.map(btn =>
    `<button onclick="nextStep('${btn.next_step_id}','${btn.label}')" class="${btn.label==='PASS'?'pass':btn.label==='FAIL'?'fail':'skip'}">${btn.label}</button>`
  ).join("");

  document.getElementById("stepContent").innerHTML = `
    <div class="step-box">
      <h3>${currentStep.title}</h3>
      <p><b>Test:</b> ${currentStep.instruction}</p>
      <p><b>Where:</b> ${currentStep.where_to_test}</p>
      <p><b>Voltage:</b> ${currentStep.expected_specs.voltage}</p>
      <p><b>How:</b> ${currentStep.how_to_test}</p>
      ${buttons}
    </div>
  `;
}

function nextStep(nextId, result){

  fetch(`${backend}/record-step-result`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      vin:vin.value,
      fault_code:code.value,
      complaint:symptom.value,
      notes:notes.value,
      step_title:currentStep.title,
      step_id:currentStep.id,
      button_result:result,
      next_step_id:nextId
    })
  });

  currentStep = tree.steps.find(s => s.id === nextId);

  renderStep();
}
</script>

</body>
</html>
